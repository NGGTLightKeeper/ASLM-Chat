{% extends "main/base.html" %}
{% load static %}

{% block title %}Profile - ASLM{% endblock %}

{% block body %}
<div class="profile-shell">
    <header class="topbar">
        <a class="back-btn" href="/" aria-label="Back to chat">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M19 12H5M12 5l-7 7 7 7"></path>
            </svg>
        </a>
        <h2 class="page-title">Account</h2>
    </header>

    <div class="profile-content">
        <div class="profile-card">
            <div class="profile-avatar">
                <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <circle cx="12" cy="8" r="4"></circle>
                    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"></path>
                </svg>
            </div>
            <div class="profile-info">
                <h1 class="profile-name">User</h1>
                <p class="profile-sub">Local account</p>
            </div>
        </div>

        <div class="profile-section">
            <h2 class="section-title">General</h2>
            <div class="profile-row">
                <span class="row-label">Username</span>
                <span class="row-value row-placeholder">-</span>
            </div>
            <div class="profile-row">
                <span class="row-label">Email</span>
                <span class="row-value row-placeholder">-</span>
            </div>
            <div class="profile-row">
                <span class="row-label">Member since</span>
                <span class="row-value row-placeholder">-</span>
            </div>
        </div>

        <div class="profile-section">
            <h2 class="section-title">Danger Zone</h2>
            <div class="profile-row">
                <span class="row-label">Sign out</span>
                <button class="danger-btn" disabled>Sign out</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
